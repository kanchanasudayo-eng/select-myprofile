<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นามบัตรออนไลน์</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="card">

    <img
        src="https://avatars.githubusercontent.com/u/9919?v=4"
        alt="avatar"
        class="card__avatar">

    <h1 id="card-name" class="card__name">
        ชื่อ นามสกุล
    </h1>

    <p class="card__title">
        นักศึกษาวิศวกรรมคอมพิวเตอร์
    </p>

    <p class="card__bio">
        กำลังเรียนรู้ Full-stack Development และ DevOps
    </p>

    <ul class="card__links">

        <li>
            <a href="https://github.com/kanchanasudayo-eng" target="_blank">
                GitHub
            </a>
        </li>

        <li>
            <a href="mailto:kanchanasuda.yo@ksu.ac.th">
                Email
            </a>
        </li>

    </ul>

    <button id="theme-toggle" class="card__button">
        🌙 โหมดกลางคืน
    </button>

    <footer id="card-footer" class="card__footer">
        © 2026 — Deploy ด้วย GitHub Pages 🚀
    </footer>

    <button id="time-button" class="card__button">
        ทดสอบวิชาหัวข้อพิเศษซอฟต์แวร์
    </button>

    <p id="time-display" class="card__time"></p>

    <section class="editor">

        <label class="editor__label">
            ลองพิมพ์ชื่อของคุณที่นี่:
        </label>

        <input
            id="name-input"
            class="editor__input"
            type="text"
            placeholder="ข้อความของคุณ">

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
